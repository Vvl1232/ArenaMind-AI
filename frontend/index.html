<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        const stored = localStorage.getItem('stadiumpilot-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="StadiumPilot AI — Enterprise-grade AI platform for FIFA World Cup 2026 stadium operations and fan experience." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="keywords" content="FIFA, World Cup 2026, AI, Stadium, Operations, Fan Experience, Generative AI" />
    <meta name="author" content="StadiumPilot AI" />
    <title>StadiumPilot AI — FIFA World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body class="bg-bg-primary text-text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
